name: Daily Scrape

on:
  schedule:
    - cron: '0 2 * * *'  # 2 AM UTC = 10 AM SGT
  workflow_dispatch:

jobs:
  scrape:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Install Playwright browsers
        run: playwright install --with-deps chromium

      - name: Run scrapers
        run: python scrape_all.py

      - name: Copy data to docs
        run: |
          mkdir -p docs/data
          cp data/latest.json data/price_history.json docs/data/

      - name: Commit data
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/ docs/data/
          git diff --cached --quiet || git commit -m "chore: update price data $(date -u +%Y-%m-%d)"
          git push
