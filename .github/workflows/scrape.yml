name: Daily Scrape

on:
  schedule:
    - cron: '0 2 * * *'  # 2 AM UTC = 10 AM SGT
  workflow_dispatch:

jobs:
  scrape:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          playwright install chromium --with-deps

      - name: Debug - inspect Giant HTML structure
        run: |
          python3 -c "
          from playwright.sync_api import sync_playwright
          with sync_playwright() as p:
              browser = p.chromium.launch(headless=True, args=['--no-sandbox'])
              page = browser.new_page()
              page.goto('https://giant.sg/search?q=rice', wait_until='domcontentloaded', timeout=30000)
              page.wait_for_timeout(8000)
              html = page.content()
              # Find product-related class names
              import re
              classes = set(re.findall(r'class=\"([^\"]*product[^\"]*?)\"', html, re.I))
              print('=== Product-related classes ===')
              for c in sorted(classes)[:30]:
                  print(c)
              # Find price patterns
              price_classes = set(re.findall(r'class=\"([^\"]*price[^\"]*?)\"', html, re.I))
              print('=== Price-related classes ===')
              for c in sorted(price_classes)[:20]:
                  print(c)
              # Dump a snippet around product cards
              idx = html.find('product')
              if idx > 0:
                  print('=== HTML snippet around first product ===')
                  print(html[max(0,idx-200):idx+500])
              browser.close()
          "

      - name: Run scrapers
        run: python scrape_all.py

      - name: Copy data to docs
        run: |
          mkdir -p docs/data
          cp data/latest.json data/price_history.json docs/data/

      - name: Commit data
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/ docs/data/
          git diff --cached --quiet || git commit -m "chore: update price data $(date -u +%Y-%m-%d)"
          git push
