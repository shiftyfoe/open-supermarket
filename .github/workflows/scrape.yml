name: Daily Scrape

on:
  schedule:
    - cron: '0 2 * * *'  # 2 AM UTC = 10 AM SGT
  workflow_dispatch:

jobs:
  scrape:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          playwright install chromium --with-deps

      - name: Debug - inspect target sites
        run: |
          echo "=== Giant search page ==="
          curl -s -o /dev/null -w "HTTP %{http_code}" "https://giant.sg/search?q=rice" -H "User-Agent: Mozilla/5.0" || true
          echo ""
          curl -s "https://giant.sg/catalogsearch/result/?q=rice" -H "User-Agent: Mozilla/5.0" -o /dev/null -w "catalogsearch: HTTP %{http_code}" || true
          echo ""
          curl -s "https://giant.sg/search" -H "User-Agent: Mozilla/5.0" -o /dev/null -w "search root: HTTP %{http_code}" || true
          echo ""
          echo "=== Giant homepage snippet ==="
          curl -s "https://giant.sg" -H "User-Agent: Mozilla/5.0" 2>/dev/null | grep -oP 'href="[^"]*search[^"]*"' | head -5
          echo "=== Sheng Siong page size ==="
          curl -s "https://www.shengsiong.com.sg/search/rice" -H "User-Agent: Mozilla/5.0" | wc -c

      - name: Run scrapers
        run: python scrape_all.py

      - name: Copy data to docs
        run: |
          mkdir -p docs/data
          cp data/latest.json data/price_history.json docs/data/

      - name: Commit data
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/ docs/data/
          git diff --cached --quiet || git commit -m "chore: update price data $(date -u +%Y-%m-%d)"
          git push
