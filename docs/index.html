<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Open Supermarket Singapore</title>
    <link rel="stylesheet" href="css/style.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body>
    <header>
        <h1>🛒 Open Supermarket Singapore</h1>
        <p>Track prices across major supermarkets</p>
    </header>

    <main>
        <section id="summary">
            <h2>Today's Summary</h2>
            <div class="stats-grid">
                <div class="stat-card">
                    <div class="stat-value" id="total-products">-</div>
                    <div class="stat-label">Products Tracked</div>
                </div>
                <div class="stat-card">
                    <div class="stat-value" id="supermarkets">-</div>
                    <div class="stat-label">Supermarkets</div>
                </div>
                <div class="stat-card">
                    <div class="stat-value" id="price-drops">-</div>
                    <div class="stat-label">Price Drops</div>
                </div>
                <div class="stat-card">
                    <div class="stat-value" id="last-updated">-</div>
                    <div class="stat-label">Last Updated</div>
                </div>
            </div>
        </section>

        <section id="comparison">
            <h2>Price Comparison</h2>
            <div class="chart-container">
                <canvas id="comparisonChart"></canvas>
            </div>
        </section>

        <section id="trends">
            <h2>Price Trends</h2>
            <div class="chart-container">
                <canvas id="trendsChart"></canvas>
            </div>
        </section>

        <section id="products">
            <h2>Product Catalog</h2>
            <div class="filters">
                <select id="supermarket-filter">
                    <option value="all">All Supermarkets</option>
                </select>
                <select id="category-filter">
                    <option value="all">All Categories</option>
                </select>
                <input type="text" id="search" placeholder="Search products...">
            </div>
            <div id="product-list"></div>
        </section>
    </main>

    <footer>
        <p>Data updated daily via GitHub Actions</p>
    </footer>

    <script src="js/app.js"></script>
</body>
</html>
